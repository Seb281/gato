name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check, lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check API
        run: pnpm --filter api build

      - name: Type-check extension
        run: pnpm --filter context-aware-translator-extension compile

      - name: Type-check web
        run: pnpm --filter web compile

      - name: Lint web
        run: pnpm --filter web lint

      - name: Test API
        run: pnpm --filter api test

      - name: Test extension
        run: pnpm --filter context-aware-translator-extension test

      - name: Build extension
        run: pnpm --filter context-aware-translator-extension build
