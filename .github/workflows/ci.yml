name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check, lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check API
        run: pnpm --filter api build

      - name: Type-check extension
        run: pnpm --filter ./apps/extension compile

      - name: Type-check web
        run: pnpm --filter web compile

      - name: Lint web
        run: pnpm --filter web lint

      - name: Test API
        run: pnpm --filter api test

      - name: Verify OpenAPI spec is up to date
        run: |
          pnpm --filter api spec:generate
          if ! git diff --exit-code apps/api/openapi.json; then
            echo "::error::openapi.json is out of date."
            echo "Run 'pnpm --filter api spec:generate' and commit the result."
            exit 1
          fi

      - name: Test extension
        run: pnpm --filter ./apps/extension test

      - name: Build extension
        run: pnpm --filter ./apps/extension build
